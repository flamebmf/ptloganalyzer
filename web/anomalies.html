<div class="header-block">
  <h1><span data-i18n="anomalies">Аномалии</span></h1>
  <div class="header-stats">
    <div class="stat-badge">Critical <span class="stat-val" id="critCount">0</span></div>
    <div class="stat-badge">Warning <span class="stat-val" id="warnCount">0</span></div>
  </div>
</div>

<div class="chart-card">
  <div class="tab-bar" style="display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06)">
    <button id="tabActive" class="tab-btn active" onclick="switchTab('active')">Активные</button>
    <button id="tabResolved" class="tab-btn" onclick="switchTab('resolved')">Решённые</button>
    <div style="flex:1"></div>
    <button class="btn btn-sm btn-outline" id="delResolvedBtn" style="display:none;margin-bottom:6px" onclick="deleteAllResolved()"><i class="bi bi-trash"></i> Удалить все решённые</button>
  </div>
  <div class="search-bar">
    <select id="deviceFilter"><option value="">All devices</option></select>
    <button id="groupToggle" class="btn btn-sm btn-outline" style="font-size:.72rem" onclick="toggleGroupBy()"><i class="bi bi-collection"></i> Group by</button>
    <button class="btn btn-primary btn-sm" onclick="loadAnomalies()"><i class="bi bi-arrow-clockwise"></i></button>
  </div>
  <div id="anomalyList"></div>
  <div id="pagination" class="pagination-bar" style="display:flex;justify-content:center;gap:8px;padding:12px 0"></div>
</div>

<!-- Recommendation modal -->
<div class="modal-overlay" id="recModal" onclick="if(event.target===this)closeRecModal()" style="display:none">
  <div class="modal-content" style="max-width:800px;width:92%">
    <div class="modal-header">
      <span id="recModalTitle">Рекомендация по устранению</span>
      <button class="modal-close" onclick="closeRecModal()">&times;</button>
    </div>
    <div class="modal-body rec-body" id="recModalBody">Загрузка...</div>
  </div>
</div>

<script>
var _currentTab = 'active';
var _pageSize = 20;
var _currentPage = 0;
var _totalItems = 0;
var _groupBy = false;

function toggleGroupBy() {
  _groupBy = !_groupBy;
  var btn = document.getElementById('groupToggle');
  btn.className = 'btn btn-sm ' + (_groupBy ? 'btn-primary' : 'btn-outline');
  btn.style.fontSize = '.72rem';
  btn.innerHTML = '<i class="bi bi-collection"></i> Grouped';
  _currentPage = 0;
  document.getElementById('pagination').style.display = _groupBy ? 'none' : 'flex';
  loadAnomalies();
}

function yandexLinks(text) {
  var m = text.match(/^(.+?) · повтор/);
  if (m) {
    var q = encodeURIComponent(m[1]);
    return '<a href="https://yandex.ru/search/?text=' + q + '" target="_blank" rel="noopener" class="anomaly-search-link">' + m[1] + '</a>' + text.slice(m[0].length);
  }
  return text;
}

function switchTab(tab) {
  _currentTab = tab;
  _currentPage = 0;
  document.getElementById('tabActive').className = 'tab-btn' + (tab === 'active' ? ' active' : '');
  document.getElementById('tabResolved').className = 'tab-btn' + (tab === 'resolved' ? ' active' : '');
  document.getElementById('delResolvedBtn').style.display = tab === 'resolved' ? '' : 'none';
  document.getElementById('pagination').style.display = _groupBy ? 'none' : 'flex';
  loadAnomalies();
}

async function loadAnomalies() {
  try {
    var deviceId = document.getElementById('deviceFilter').value;
    var resolved = _currentTab === 'resolved';
    var limit = _groupBy ? 500 : _pageSize;
    var offset = _groupBy ? 0 : (_currentPage * _pageSize);
    var url = '/api/anomalies?limit=' + limit + '&offset=' + offset + '&resolved=' + resolved;
    if (deviceId) url += '&device_id=' + deviceId;

    var data = await apiGet(url);
    _totalItems = data.total || 0;
    var items = data.items || [];
    var list = document.getElementById('anomalyList');

    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon"><i class="bi ' + (resolved ? 'bi-check-all' : 'bi-check-circle') + '"></i></div><p>' + (resolved ? 'Решённых аномалий нет' : 'Аномалий не обнаружено') + '</p></div>';
    } else if (_groupBy) {
      var groups = {};
      var totalCrit = 0, totalWarn = 0;
      items.forEach(function(a) {
        var host = a.name || a.hostname || 'unknown';
        if (!groups[host]) groups[host] = [];
        groups[host].push(a);
        if (a.severity === 'critical') totalCrit++;
        else if (a.severity === 'warning') totalWarn++;
      });
      document.getElementById('critCount').textContent = totalCrit;
      document.getElementById('warnCount').textContent = totalWarn;

      var hostnames = Object.keys(groups).sort();
      list.innerHTML = hostnames.map(function(host) {
        var group = groups[host];
        var critGroup = group.filter(function(a) { return a.severity === 'critical'; }).length;
        var warnGroup = group.filter(function(a) { return a.severity === 'warning'; }).length;
        var badgeHtml = '';
        if (critGroup) badgeHtml += '<span class="badge badge-err" style="margin-left:4px">' + critGroup + ' critical</span>';
        if (warnGroup) badgeHtml += '<span class="badge badge-warn" style="margin-left:4px">' + warnGroup + ' warning</span>';
        return '<div style="margin-bottom:16px">'
          + '<div style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:4px">'
          + '<span style="font-weight:700;font-size:.85rem;color:var(--pt-accent2)">' + escHtml(host) + '</span>'
          + '<span class="badge badge-info" style="margin-left:8px">' + group.length + '</span>'
          + badgeHtml
          + '</div>'
          + group.map(renderAnomalyItem).join('')
          + '</div>';
      }).join('');
      document.getElementById('pagination').style.display = 'none';
    } else {
      var crit = 0, warn = 0;
      list.innerHTML = items.map(function(a) {
        if (a.severity === 'critical') crit++;
        else if (a.severity === 'warning') warn++;
        return renderAnomalyItem(a);
      }).join('');
      document.getElementById('critCount').textContent = crit;
      document.getElementById('warnCount').textContent = warn;
      document.getElementById('pagination').style.display = 'flex';
    }
    renderPagination();
  } catch(err) { showToast('Error: '+err, 'error'); }
}

function renderAnomalyItem(a) {
  var icon = a.severity === 'critical' ? 'bi-exclamation-triangle-fill' :
             a.severity === 'warning' ? 'bi-exclamation-circle-fill' : 'bi-info-circle-fill';
  var badge = '';
  if (a.count > 1) badge = '<span class="badge badge-err" style="margin-left:6px">x' + a.count + '</span>';
  if (a.resolved_at) badge += '<span class="badge badge-ok" style="margin-left:6px">resolved</span>';
  var timeStr = formatTime(a.detected_at) + (a.last_seen && a.count > 1 ? ' — ' + formatTime(a.last_seen) : '');
  if (a.resolved_at) timeStr += ' &middot; resolved: ' + formatTime(a.resolved_at);
  return '<div class="anomaly-item ' + (a.resolved_at ? 'resolved' : a.severity) + '">'
    + '<div class="anomaly-icon"><i class="bi ' + icon + '"></i></div>'
    + '<div style="flex:1">'
    + '<div class="anomaly-title">' + (a.hostname ? '<a href="device.html?id=' + a.device_id + '" style="color:var(--pt-accent2);font-size:.75rem;margin-right:4px;text-decoration:none">' + escHtml(a.name || a.hostname) + '</a>' : '') + convertLogIds(a.title || '', a.device_id) + badge + '</div>'
    + (a.description ? '<div class="anomaly-desc">' + yandexLinks(convertLogIds(a.description, a.device_id)) + '</div>' : '')
    + '<div class="anomaly-time">' + timeStr + '</div>'
    + '<div style="margin-top:6px"><button class="btn btn-sm btn-outline" onclick="openRec(' + a.id + ',\'' + escJs(a.title) + '\',' + (a.device_id || 0) + ')" style="font-size:.72rem"><i class="bi bi-lightbulb"></i> Что можно сделать</button></div>'
    + '</div></div>';
}

function renderPagination() {
  var el = document.getElementById('pagination');
  var pages = Math.ceil(_totalItems / _pageSize);
  if (pages <= 1) { el.innerHTML = ''; return; }
  var html = '';
  html += '<button class="btn btn-sm btn-outline" onclick="goPage(0)"' + (_currentPage === 0 ? ' disabled' : '') + '><i class="bi bi-chevron-double-left"></i></button>';
  html += '<button class="btn btn-sm btn-outline" onclick="goPage(' + (_currentPage - 1) + ')"' + (_currentPage === 0 ? ' disabled' : '') + '><i class="bi bi-chevron-left"></i></button>';
  var start = Math.max(0, _currentPage - 2);
  var end = Math.min(pages, _currentPage + 3);
  for (var p = start; p < end; p++) {
    html += '<button class="btn btn-sm ' + (p === _currentPage ? 'btn-primary' : 'btn-outline') + '" onclick="goPage(' + p + ')">' + (p + 1) + '</button>';
  }
  html += '<button class="btn btn-sm btn-outline" onclick="goPage(' + (_currentPage + 1) + ')"' + (_currentPage >= pages - 1 ? ' disabled' : '') + '><i class="bi bi-chevron-right"></i></button>';
  html += '<button class="btn btn-sm btn-outline" onclick="goPage(' + (pages - 1) + ')"' + (_currentPage >= pages - 1 ? ' disabled' : '') + '><i class="bi bi-chevron-double-right"></i></button>';
  el.innerHTML = html;
}

function goPage(p) {
  _currentPage = p;
  loadAnomalies();
}

async function deleteAllResolved() {
  if (!confirm('Удалить все решённые аномалии? Это действие необратимо.')) return;
  try {
    var r = await apiDelete('/api/anomalies/resolved');
    showToast('Удалено ' + r.deleted + ' аномалий', 'success');
    loadAnomalies();
  } catch(err) { showToast('Ошибка: '+err, 'error'); }
}

function escJs(s) {
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

function openRec(id, title, deviceId) {
  var overlay = document.getElementById('recModal');
  var body = document.getElementById('recModalBody');
  var titleEl = document.getElementById('recModalTitle');
  titleEl.textContent = 'Рекомендация: ' + title;
  body.innerHTML = '<div class="modal-loading"><div class="spinner"></div><span style="color:var(--pt-muted);font-size:.8rem">Загрузка...</span></div>';
  overlay.style.display = 'flex';
  overlay.dataset.id = id;
  overlay.dataset.deviceId = deviceId;
  loadRec(id);
}

function loadRec(id, refresh) {
  var body = document.getElementById('recModalBody');
  var params = refresh ? '?refresh=true' : '';
  body.innerHTML = '<div class="modal-loading"><div class="spinner"></div><span style="color:var(--pt-muted);font-size:.8rem">' + (refresh ? 'Запрос к AI...' : 'Загрузка...') + '</span></div>';
  apiPost('/api/anomalies/' + id + '/recommend' + params).then(function(r) {
    if (r.error) {
      body.innerHTML = '<span style="color:#ff5252">Ошибка: ' + r.error + '</span>';
    } else {
      var overlay = document.getElementById('recModal');
      var did = overlay ? parseInt(overlay.dataset.deviceId) : null;
      body.innerHTML = convertLogIds(mdToHtml(r.recommendation || '*Нет ответа*'), did)
        + '<div style="margin-top:16px;display:flex;gap:8px;align-items:center;border-top:1px solid rgba(255,255,255,.06);padding-top:12px">'
        + '<button class="btn btn-sm btn-outline" onclick="loadRec(' + id + ',true)"><i class="bi bi-arrow-clockwise"></i> Обновить</button>'
        + (r.cached ? '<span style="font-size:.72rem;color:var(--pt-muted)"><i class="bi bi-check-circle" style="color:var(--pt-success)"></i> из кэша</span>' : '')
        + '</div>';
    }
  }).catch(function(err) {
    body.innerHTML = '<span style="color:#ff5252">Ошибка: ' + err + '</span>';
  });
}

function closeRecModal() {
  document.getElementById('recModal').style.display = 'none';
}

async function initAnomalies() {
  try {
    var devices = await apiGet('/api/devices');
    var sel = document.getElementById('deviceFilter');
    devices.forEach(function(d) {
      var opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.hostname;
      sel.appendChild(opt);
    });
  } catch(err) {}
  switchTab('active');
}

initAnomalies();
</script>
