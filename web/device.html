<div class="header-block">
  <h1 id="deviceTitle">Устройство</h1>
  <div class="header-stats" id="deviceStats"></div>
</div>

<div class="chart-row">
  <div class="chart-card half">
    <div class="card-header"><div class="card-title">Volume</div></div>
    <div id="volumeChart"></div>
  </div>
  <div class="chart-card narrow">
    <div class="card-header"><div class="card-title">Severity</div></div>
    <div id="severityChart"></div>
  </div>
</div>

<div class="chart-card" style="margin-top:14px">
  <div class="summary-toolbar">
    <div class="summary-tabs">
      <button class="summary-tab active" data-type="" onclick="switchSummaryTab(this)">Сегодня</button>
      <button class="summary-tab" data-type="daily" onclick="switchSummaryTab(this)">Дневные</button>
      <button class="summary-tab" data-type="period" onclick="switchSummaryTab(this)">Часовые</button>
    </div>
    <div class="summary-nav">
      <button class="btn btn-outline btn-sm" onclick="shiftSummaryDay(-1)"><i class="bi bi-chevron-left"></i></button>
      <span id="summaryDateLabel" style="font-size:.82rem;font-weight:700;min-width:100px;text-align:center;display:inline-block;color:var(--pt-text)"></span>
      <button class="btn btn-outline btn-sm" onclick="shiftSummaryDay(1)"><i class="bi bi-chevron-right"></i></button>
      <button class="btn btn-outline btn-sm" onclick="todaySummary()" title="Сегодня"><i class="bi bi-calendar-check"></i></button>
    </div>
  </div>
  <div id="summaryContent"><span style="color:var(--pt-muted)">Загрузка...</span></div>
  <div id="summaryCarouselBar" class="summary-carousel-bar" style="display:none">
    <button class="carousel-arrow" onclick="carouselMove(-1)" id="carouselPrev" style="visibility:hidden"><i class="bi bi-chevron-left"></i></button>
    <div id="summaryDots" class="summary-dots"></div>
    <button class="carousel-arrow" onclick="carouselMove(1)" id="carouselNext"><i class="bi bi-chevron-right"></i></button>
  </div>
</div>

<div class="chart-card" style="margin-top:14px">
  <div class="card-header">
    <div class="card-title"><i class="bi bi-exclamation-triangle"></i> <span data-i18n="anomalies">Аномалии</span> <span class="badge badge-err" id="deviceAnomalyCount" style="font-size:.7rem;margin-left:6px">0</span></div>
    <button class="btn btn-outline btn-sm" onclick="loadDeviceAnomalies(0)"><i class="bi bi-arrow-clockwise"></i></button>
  </div>
  <div id="deviceAnomalyList" style="font-size:.82rem"></div>
  <div id="anomalyPagination" class="pagination-bar" style="display:none;justify-content:center;gap:8px;padding:12px 0"></div>
</div>

<!-- Recommendation modal -->
<div class="modal-overlay" id="recModal" onclick="if(event.target===this)closeRecModal()" style="display:none">
  <div class="modal-content" style="max-width:800px;width:92%">
    <div class="modal-header">
      <span id="recModalTitle">Рекомендация по устранению</span>
      <button class="modal-close" onclick="closeRecModal()">&times;</button>
    </div>
    <div class="modal-body rec-body" id="recModalBody">Загрузка...</div>
  </div>
</div>

<!-- Anomaly detail modal -->
<div class="modal-overlay" id="anomalyDetailModal" onclick="if(event.target===this)closeAnomalyDetail()" style="display:none">
  <div class="modal-content" style="max-width:700px;width:92%">
    <div class="modal-header">
      <span id="anomalyDetailTitle" style="font-weight:700">Детали аномалии</span>
      <button class="modal-close" onclick="closeAnomalyDetail()">&times;</button>
    </div>
    <div class="modal-body" id="anomalyDetailBody" style="font-size:.85rem;line-height:1.6"></div>
  </div>
</div>

<div class="chart-card" style="margin-top:14px" id="zmstatCard" hidden>
  <div class="card-header">
    <div class="card-title" onclick="toggleZmstat()" style="cursor:pointer">
      <i class="bi bi-chevron-right" id="zmstatChevron"></i> <i class="bi bi-graph-up"></i> App metrics
    </div>
    <div style="display:flex;gap:6px">
      <select id="zmstatMetric" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:6px 10px;color:var(--pt-text);font-family:inherit;font-size:.75rem;outline:none" onchange="loadAppMetrics()">
        <option value="">— выберите —</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="loadAppMetrics()"><i class="bi bi-arrow-clockwise"></i></button>
    </div>
  </div>
  <div id="zmstatContent" style="display:none"></div>
</div>

<div class="chart-card" style="margin-top:14px">
  <div class="card-header">
    <div class="card-title"><span data-i18n="logs">Логи</span></div>
    <div>
      <button class="btn btn-outline btn-sm" id="toggleLogsBtn" onclick="toggleLogs()" style="display:none"><i class="bi bi-chevron-down"></i> <span id="toggleLogsLabel">Показать все</span></button>
      <button class="btn btn-outline btn-sm" onclick="loadDeviceLogs()"><i class="bi bi-arrow-clockwise"></i></button>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="logSearch" placeholder="Поиск..." onkeyup="if(event.key==='Enter')loadDeviceLogs()">
    <div id="sevFilter"></div>
    <button class="btn btn-outline btn-sm" id="semanticToggle" onclick="toggleSemantic()" title="Семантический поиск"><i class="bi bi-stars"></i></button>
    <button class="btn btn-primary btn-sm" onclick="loadDeviceLogs()"><i class="bi bi-search"></i></button>
  </div>
  <div id="logList"></div>
</div>

<script>
var deviceId = null;
var volumeChart = null;
var sevChart = null;
var _allLogs = [];
var _logsExpanded = false;
var _semanticMode = false;
var _anomalyPage = 0;
var _anomalyPageSize = 10;
var _anomalyTotal = 0;

// Summary carousel state
var _summaryType = '';
var _summaryDate = '';
var _summaryItems = [];
var _summaryIndex = 0;

function fmtHour(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return '' + d.getHours();
}

function fmtDateLabel(iso) {
  if (!iso) return '';
  var d = new Date(iso + 'T00:00:00');
  var today = new Date();
  var y = d.getFullYear(), m = ('0'+(d.getMonth()+1)).slice(-2), day = ('0'+d.getDate()).slice(-2);
  var label = day + '.' + m + '.' + y;
  if (y === today.getFullYear() && d.getMonth() === today.getMonth() && d.getDate() === today.getDate()) {
    label = 'Сегодня, ' + label;
  }
  return label;
}

async function loadDevice() {
  createSeverityDropdown(document.getElementById('sevFilter'));
  var main = document.getElementById('mainContent');
  var pageUrl = main ? main.dataset.page : window.location.hash.replace(/^#/, '');
  var qs = pageUrl && pageUrl.includes('?') ? pageUrl.split('?')[1] : location.search.substring(1);
  var params = new URLSearchParams(qs);
  deviceId = parseInt(params.get('id'));
  if (!deviceId) return;

  try {
    var [dev, stats] = await Promise.all([
      apiGet('/api/devices/' + deviceId),
      apiGet('/api/devices/' + deviceId + '/stats'),
    ]);
    document.getElementById('deviceTitle').textContent = dev.name || dev.hostname || 'Device #' + deviceId;
    var lastSeen = stats.last_seen ? formatTime(stats.last_seen) : '-';
    var totalFmt = (stats.total||0).toLocaleString();
    var errFmt = (stats.errors||0).toLocaleString();
    document.getElementById('deviceStats').innerHTML =
      '<span class="stat-badge">Logs <span class="stat-val">' + totalFmt + '</span></span>'
      + '<span class="stat-badge">Last <span class="stat-val">' + lastSeen + '</span></span>'
      + '<span class="stat-badge">Errors <span class="stat-val">' + errFmt + '</span></span>';

    // Fire off remaining loads in parallel
    loadCharts();
    loadDeviceLogs();
    loadSummaries();
    loadDeviceAnomalies();
    initAppMetrics();
  } catch(err) { showToast('Error: '+err, 'error'); }
}

async function loadCharts() {
  var hist = await apiGet('/api/devices/' + deviceId + '/history');
  var volData = (hist.volume || []).map(function(d) { return {hour: d.hour, count: d.count}; });
  var sevData = (hist.severity || []).map(function(d) { return {severity: d.severity, count: d.count}; });

  if (volumeChart) volumeChart.destroy();
  volumeChart = createLogVolumeChart('volumeChart', volData);

  if (sevChart) sevChart.destroy();
  sevChart = createSeverityChart('severityChart', sevData);
}

function renderLogs(data) {
  _allLogs = data.items || [];
  _logsExpanded = false;
  renderLogList();
}

function renderLogList(semantic) {
  var list = document.getElementById('logList');
  var toggleBtn = document.getElementById('toggleLogsBtn');
  var toggleLabel = document.getElementById('toggleLogsLabel');

  if (_allLogs.length === 0) {
    list.innerHTML = '<div class="empty-state"><p>Нет результатов</p></div>';
    toggleBtn.style.display = 'none';
    return;
  }

  var show = semantic || _logsExpanded ? _allLogs : _allLogs.slice(0, 3);
  list.innerHTML = show.map(function(l) {
    var scoreHtml = l.score ? ' <span style="color:var(--pt-muted);font-size:.72rem">(' + (l.score*100).toFixed(0) + '%)</span>' : '';
    return '<div class="log-line" onclick="openLogModal(' + l.id + ',' + deviceId + ')" style="cursor:pointer">'
      + '<span class="ts">' + formatTime(l.ts) + '</span>'
      + '<span class="sev ' + severityClass(l.severity) + '">' + severityBadge(l.severity) + '</span>'
      + '<span class="msg">' + l.message + scoreHtml + '</span>'
      + '</div>';
  }).join('');

  if (!semantic && _allLogs.length > 3) {
    toggleBtn.style.display = 'inline-block';
    toggleLabel.textContent = _logsExpanded ? 'Свернуть' : 'Показать все (' + _allLogs.length + ')';
    document.getElementById('toggleLogsBtn').querySelector('i').className = _logsExpanded ? 'bi bi-chevron-up' : 'bi bi-chevron-down';
  } else {
    toggleBtn.style.display = 'none';
  }
}

function toggleLogs() {
  _logsExpanded = !_logsExpanded;
  renderLogList();
}

function toggleSemantic() {
  _semanticMode = !_semanticMode;
  var btn = document.getElementById('semanticToggle');
  btn.classList.toggle('btn-outline');
  btn.classList.toggle('btn-primary');
  if (_semanticMode) {
    document.getElementById('sevFilter').disabled = true;
    showToast('Семантический поиск: найду похожие логи по смыслу');
  } else {
    document.getElementById('sevFilter').disabled = false;
  }
  loadDeviceLogs();
}

async function loadDeviceLogs() {
  if (!deviceId) return;
  var query = document.getElementById('logSearch').value;
  var listEl = document.getElementById('logList');

  if (_semanticMode) {
    if (!query) { _allLogs = []; renderLogList(); return; }
    showLoading(listEl);
    var url = '/api/logs/similar?q=' + encodeURIComponent(query) + '&device_id=' + deviceId + '&limit=20';
    try {
      var data = await apiGet(url);
      _allLogs = data.items.map(function(r) {
        return { id: r.log_id, device_id: r.device_id, ts: r.ts, severity: 6, message: r.snippet, score: r.score };
      });
      renderLogList(true);
    } catch(err) { showToast('Ошибка: '+err, 'error'); }
    return;
  }

  var sev = document.getElementById('sevFilter').value;
  var url = '/api/logs?device_id=' + deviceId + '&limit=20';
  if (query) url += '&query=' + encodeURIComponent(query);
  if (sev) url += '&severity=' + sev;

  showLoading(listEl);
  try {
    var data = await apiGet(url);
    renderLogs(data);
  } catch(err) { showToast('Error: '+err, 'error'); }
}

async function loadDeviceAnomalies(page) {
  if (!deviceId) return;
  if (typeof page === 'number') _anomalyPage = page;
  try {
    var offset = _anomalyPage * _anomalyPageSize;
    var data = await apiGet('/api/anomalies?device_id=' + deviceId + '&limit=' + _anomalyPageSize + '&offset=' + offset + '&resolved=false');
    var el = document.getElementById('deviceAnomalyList');
    var countEl = document.getElementById('deviceAnomalyCount');
    var items = data.items || [];
    _anomalyTotal = data.total || items.length;
    if (countEl) countEl.textContent = _anomalyTotal;
    if (items.length === 0) {
      el.innerHTML = '<div class="empty-state" style="padding:12px"><p>Нет активных аномалий</p></div>';
      document.getElementById('anomalyPagination').style.display = 'none';
      return;
    }
    el.innerHTML = items.map(function(a) {
      var sevColor = a.severity === 'critical' ? '#ff5252' : (a.severity === 'warning' ? '#ffd740' : '#00d4ff');
      var dot = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + sevColor + ';margin-right:6px;flex-shrink:0"></span>';
      return '<div class="anomaly-row" onclick="openAnomalyDetail(' + a.id + ',\'' + escJs(a.title) + '\',\'' + escJs(a.severity) + '\',\'' + escJs(a.description||'') + '\',\'' + (a.detected_at||'') + '\',\'' + (a.last_seen||'') + '\',' + (a.count||1) + ')" style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);align-items:center;cursor:pointer">'
        + '<span style="white-space:nowrap;font-size:.72rem;color:var(--pt-muted);min-width:75px">' + formatTime(a.detected_at) + '</span>'
        + '<span style="white-space:nowrap;font-size:.72rem;min-width:55px;display:flex;align-items:center">' + dot + (a.severity==='critical'?'Crit':'Warn') + '</span>'
        + '<span style="flex:1;color:var(--pt-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + convertLogIds(escHtml(a.title), deviceId) + '</span>'
        + (a.count > 1 ? '<span class="badge badge-err" style="font-size:.65rem;flex-shrink:0">' + a.count + 'x</span>' : '')
        + '<button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openRec(' + a.id + ',\'' + escJs(a.title) + '\',' + deviceId + ')" style="font-size:.65rem;padding:2px 6px;flex-shrink:0" title="Что можно сделать"><i class="bi bi-lightbulb"></i></button>'
        + '</div>';
    }).join('');
    // Pagination
    var pages = Math.ceil(_anomalyTotal / _anomalyPageSize);
    var pgEl = document.getElementById('anomalyPagination');
    if (pages > 1) {
      var pgHtml = '';
      pgHtml += '<button class="btn btn-sm btn-outline" onclick="loadDeviceAnomalies(0)"' + (_anomalyPage===0?' disabled':'') + '><i class="bi bi-chevron-double-left"></i></button>';
      pgHtml += '<button class="btn btn-sm btn-outline" onclick="loadDeviceAnomalies(' + (_anomalyPage-1) + ')"' + (_anomalyPage===0?' disabled':'') + '><i class="bi bi-chevron-left"></i></button>';
      for (var p = Math.max(0,_anomalyPage-2); p < Math.min(pages,_anomalyPage+3); p++) {
        pgHtml += '<button class="btn btn-sm ' + (p===_anomalyPage?'btn-primary':'btn-outline') + '" onclick="loadDeviceAnomalies(' + p + ')">' + (p+1) + '</button>';
      }
      pgHtml += '<button class="btn btn-sm btn-outline" onclick="loadDeviceAnomalies(' + (_anomalyPage+1) + ')"' + (_anomalyPage>=pages-1?' disabled':'') + '><i class="bi bi-chevron-right"></i></button>';
      pgHtml += '<button class="btn btn-sm btn-outline" onclick="loadDeviceAnomalies(' + (pages-1) + ')"' + (_anomalyPage>=pages-1?' disabled':'') + '><i class="bi bi-chevron-double-right"></i></button>';
      pgEl.innerHTML = pgHtml;
      pgEl.style.display = 'flex';
    } else {
      pgEl.style.display = 'none';
    }
  } catch(err) { showToast('Ошибка: '+err, 'error'); }
}

function openAnomalyDetail(id, title, severity, description, detectedAt, lastSeen, count) {
  var overlay = document.getElementById('anomalyDetailModal');
  document.getElementById('anomalyDetailTitle').textContent = title;
  var sevColor = severity === 'critical' ? '#ff5252' : '#ffd740';
  var html = '<div style="margin-bottom:12px">'
    + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + sevColor + '"></span> '
    + '<b>' + (severity === 'critical' ? 'Critical' : 'Warning') + '</b>'
    + (count > 1 ? ' <span class="badge badge-err" style="font-size:.7rem">x' + count + '</span>' : '')
    + '</div>';
  html += '<div style="color:var(--pt-muted);font-size:.78rem;margin-bottom:10px">'
    + formatTime(detectedAt) + (lastSeen && count > 1 ? ' — ' + formatTime(lastSeen) : '')
    + '</div>';
  if (description) {
    html += '<div style="font-size:.85rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;padding:12px;background:rgba(255,255,255,.02);border-radius:8px;border:1px solid rgba(255,255,255,.04)">'
      + yandexLinks(convertLogIds(escHtml(description), deviceId))
      + '</div>';
  } else {
    html += '<div style="color:var(--pt-muted);font-size:.85rem">Нет описания</div>';
  }
  html += '<div style="margin-top:14px;border-top:1px solid rgba(255,255,255,.06);padding-top:10px">'
    + '<button class="btn btn-sm btn-outline" onclick="event.stopPropagation();closeAnomalyDetail();openRec(' + id + ',\'' + escJs(title) + '\',' + deviceId + ')" style="font-size:.75rem"><i class="bi bi-lightbulb"></i> Что можно сделать</button>'
    + '</div>';
  document.getElementById('anomalyDetailBody').innerHTML = html;
  overlay.style.display = 'flex';
}

function closeAnomalyDetail() {
  document.getElementById('anomalyDetailModal').style.display = 'none';
}

function yandexLinks(text) {
  var m = text.match(/^(.+?) . повтор/);
  if (m) {
    var q = encodeURIComponent(m[1]);
    return '<a href="https://yandex.ru/search/?text=' + q + '" target="_blank" rel="noopener" class="anomaly-search-link">' + m[1] + '</a>' + text.slice(m[0].length);
  }
  return text;
}

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

function switchSummaryTab(btn) {
  document.querySelectorAll('.summary-tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  _summaryType = btn.dataset.type;
  _summaryDate = todayStr();
  loadSummaries();
}

function shiftSummaryDay(delta) {
  if (!_summaryDate) _summaryDate = todayStr();
  var d = new Date(_summaryDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  _summaryDate = d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
  loadSummaries();
}

function todaySummary() {
  _summaryDate = todayStr();
  loadSummaries();
}

async function loadSummaries() {
  if (!deviceId) return;
  if (!_summaryDate) _summaryDate = todayStr();

  var url = '/api/summaries?device_id=' + deviceId + '&limit=20&tz_offset=' + (-new Date().getTimezoneOffset());
  if (_summaryType) url += '&summary_type=' + _summaryType;
  if (_summaryDate) url += '&date=' + _summaryDate;

  try {
    var data = await apiGet(url);
    _summaryItems = data.items || [];
    _summaryIndex = 0;

    document.getElementById('summaryDateLabel').textContent = fmtDateLabel(_summaryDate);

    if (_summaryItems.length === 0) {
      document.getElementById('summaryContent').innerHTML = '<div class="empty-state"><p>Нет сводок</p></div>';
      document.getElementById('summaryCarouselBar').style.display = 'none';
      return;
    }

    renderSummaryItem();
  } catch(err) {}
}

function renderSummaryItem() {
  var el = document.getElementById('summaryContent');
  var bar = document.getElementById('summaryCarouselBar');
  var s = _summaryItems[_summaryIndex];
  if (!s) return;

  var icon = s.summary_type === 'daily' ? 'bi-calendar3' : 'bi-clock';
  var badge = s.summary_type === 'daily' ? ' <span class="badge badge-info" style="font-size:.65rem">daily</span>' : '';
  var hdr = '<small style="color:var(--pt-muted);display:block;margin-bottom:6px">'
    + '<i class="bi ' + icon + '"></i> '
    + formatTime(s.period_start) + ' — ' + formatTime(s.period_end)
    + badge
    + (s.model ? ' <span style="color:var(--pt-muted);font-size:.7rem">[' + s.model + ']</span>' : '')
    + '</small>';

  var summaryHtml = convertLogIds(mdToHtml(s.summary));
  // Collapse: show first ~10 lines via max-height, expand on click
  var fullId = 'summaryFull_' + _summaryIndex;
  el.innerHTML = '<div class="summary-block">'
    + hdr
    + '<div id="' + fullId + '" style="font-size:.85rem;line-height:1.7;max-height:18em;overflow:hidden">' + summaryHtml + '</div>'
    + '<button id="' + fullId + '_btn" class="btn btn-sm btn-outline" onclick="toggleSummaryExpand(this,\'' + fullId + '\')" style="font-size:.7rem;margin-top:4px;display:none">... Читать дальше</button>'
    + '</div>';
  // Show expand button only if content overflows
  setTimeout(function() {
    var div = document.getElementById(fullId);
    if (div && div.scrollHeight > div.clientHeight + 5) {
      document.getElementById(fullId + '_btn').style.display = 'inline-block';
    }
  }, 100);

  // Carousel bar
  if (_summaryItems.length > 1) {
    bar.style.display = 'flex';
    document.getElementById('carouselPrev').style.visibility = _summaryIndex > 0 ? 'visible' : 'hidden';
    document.getElementById('carouselNext').style.visibility = _summaryIndex < _summaryItems.length - 1 ? 'visible' : 'hidden';

    var dots = document.getElementById('summaryDots');
    dots.innerHTML = _summaryItems.map(function(item, i) {
      var label = s.summary_type === 'period' ? fmtHour(item.period_start) : (i + 1);
      var active = i === _summaryIndex ? ' active' : '';
      return '<span class="carousel-dot' + active + '" onclick="carouselGo(' + i + ')">' + label + '</span>';
    }).join('');
  } else {
    bar.style.display = 'none';
  }
}

function carouselMove(dir) {
  var i = _summaryIndex + dir;
  if (i < 0 || i >= _summaryItems.length) return;
  _summaryIndex = i;
  renderSummaryItem();
}

function carouselGo(i) {
  if (i < 0 || i >= _summaryItems.length) return;
  _summaryIndex = i;
  renderSummaryItem();
}

var _appMetricCharts = {};

// App metric panel registry — populated from /api/app-manifest/<app_id> on-demand
var APP_PANELS = {};
var _panelLoading = {};

async function loadPanelScript(appId) {
  if (APP_PANELS[appId]) return;
  if (_panelLoading[appId]) return;
  _panelLoading[appId] = true;
  try {
    var resp = await fetch('/api/app-manifest/' + appId);
    if (!resp.ok) return;
    var manifest = await resp.json();
    if (manifest.panels && manifest.panels.length) {
      APP_PANELS[appId] = manifest.panels;
    }
  } catch(e) {}
}

async function initAppMetrics() {
  if (!deviceId) return;
  try {
    var data = await apiGet('/api/app-metrics/list?device_id=' + deviceId);
    var apps = data.apps || [];
    var card = document.getElementById('zmstatCard');
    if (apps.length === 0) { card.hidden = true; return; }
    card.hidden = false;
    var sel = document.getElementById('zmstatMetric');
    sel.innerHTML = '<option value="">— выберите —</option>'
      + apps.map(function(a) { return '<option value="' + a + '">' + a + '</option>'; }).join('');
    sel.value = apps[0];
  } catch(err) { if (card) card.hidden = true; }
}

function toggleZmstat() {
  var el = document.getElementById('zmstatContent');
  var ch = document.getElementById('zmstatChevron');
  if (!el) return;
  var show = el.style.display !== 'block';
  el.style.display = show ? 'block' : 'none';
  ch.className = show ? 'bi bi-chevron-down' : 'bi bi-chevron-right';
}

async function loadAppMetrics() {
  if (!deviceId) return;
  var appId = document.getElementById('zmstatMetric').value;
  if (!appId) {
    var cc = document.getElementById('zmstatContent');
    if (cc && cc.style.display === 'block') toggleZmstat();
    return;
  }
  if (cc && cc.style.display !== 'block') toggleZmstat();
  Object.keys(_appMetricCharts).forEach(function(k) {
    if (_appMetricCharts[k]) { _appMetricCharts[k].destroy(); delete _appMetricCharts[k]; }
  });
  document.getElementById('zmstatContent').innerHTML = '';

  await loadPanelScript(appId);
  if (loadAppPanels(appId)) return;

  // Generic fallback: line chart from /series for unknown apps
  try {
    var data = await apiGet('/api/app-metrics/series?device_id=' + deviceId + '&app_id=' + appId + '&hours=24');
    var items = data.items || [];
    var container = document.getElementById('zmstatContent');
    if (items.length === 0) { container.innerHTML = '<div class="empty-state" style="padding:20px"><p>No data</p></div>'; return; }
    var fieldNames = Object.keys(items[0].fields || {}).filter(function(f) { return f !== '_metric'; });
    var numericFields = fieldNames.filter(function(f) { return typeof items[0].fields[f] === 'number'; });
    if (numericFields.length === 0) { container.innerHTML = '<div class="empty-state" style="padding:20px"><p>No numeric fields</p></div>'; return; }
    container.innerHTML = '<div id="zmstatLineChart" style="height:160px"></div>';
    var datasets = numericFields.map(function(f) {
      return { label: f, data: items.map(function(d) { return {x: new Date(d.ts).getTime(), y: d.fields[f]}; }) };
    });
    _appMetricCharts['main'] = createApexLineChart('zmstatLineChart', datasets);
  } catch(err) { showToast('Error: '+err, 'error'); }
}

function loadAppPanels(appId) {
  var panels = APP_PANELS[appId];
  if (!panels) return false;

  var container = document.getElementById('zmstatContent');
  var bars = panels.filter(function(p) { return p.type !== 'list' && p.type !== 'line'; });
  var lines = panels.filter(function(p) { return p.type === 'line'; });
  var lists = panels.filter(function(p) { return p.type === 'list'; });

  var html = '';
  for (var i = 0; i < bars.length; i += 2) {
    html += '<div class="chart-row" style="margin-bottom:10px">';
    html += _panelBarHtml(bars[i]);
    if (bars[i + 1]) html += _panelBarHtml(bars[i + 1]);
    html += '</div>';
  }
  lines.forEach(function(p) {
    html += '<div class="chart-card" style="padding:8px;margin-bottom:10px">'
      + '<div style="font-size:.72rem;color:var(--pt-muted);margin-bottom:4px">' + p.title + '</div>'
      + '<div id="' + p.id + '" style="height:140px"></div></div>';
  });
  lists.forEach(function(p) {
    html += '<div class="chart-card" style="padding:8px;overflow:hidden;margin-bottom:10px">'
      + '<div style="font-size:.72rem;color:var(--pt-muted);margin-bottom:4px">' + p.title + '</div>'
      + '<div id="' + p.id + '" style="font-size:.72rem;overflow-y:auto;max-height:100px"></div></div>';
  });
  container.innerHTML = html;

  bars.forEach(function(p) {
    renderAppBar(p.id, appId, p.dim, p.metric, p.unit, p.filter, p.hours);
  });
  lines.forEach(function(p) {
    renderAppLine(p.id, appId, p.field, p.unit, p.agg, p.hours);
  });
  lists.forEach(function(p) {
    renderAppList(p.id, appId, p.dim, p.limit, p.hours);
  });
  return true;
}

function _panelBarHtml(p) {
  return '<div class="chart-card half" style="padding:8px">'
    + '<div style="font-size:.72rem;color:var(--pt-muted);margin-bottom:4px">' + p.title + '</div>'
    + '<div id="' + p.id + '" style="height:120px"></div></div>';
}

async function renderAppBar(elId, appId, dim, metric, unit, filter, hours) {
  var url = '/api/app-metrics/stats?device_id=' + deviceId + '&app_id=' + appId + '&dim=' + dim + '&hours=' + (hours || 24) + '&limit=8';
  if (metric) url += '&metric=' + metric;
  if (filter) url += '&filter=' + encodeURIComponent(filter);
  try {
    var data = await apiGet(url);
    var items = data.items || [];
    if (items.length === 0) return;
    var labels = items.map(function(r) { return String(r.label||'').substring(0,25); });
    var values = items.map(function(r) { return r.value || r.sessions; });
    _appMetricCharts[elId] = new ApexCharts(document.getElementById(elId), {
      ...ptChartTheme,
      chart: { type: 'bar', toolbar: { show: false }, background: 'transparent',
               foreColor: '#7a8294', fontFamily: 'Roboto', height: 150 },
      series: [{ name: unit || 'Count', data: values }],
      colors: ['#00d4ff'],
      plotOptions: { bar: { horizontal: true, borderRadius: 2, barHeight: '60%' } },
      dataLabels: { enabled: false },
      xaxis: { categories: labels, labels: { style: { colors: '#7a8294', fontSize: '9px' } } },
      yaxis: { labels: { style: { colors: '#e4e8ee', fontSize: '10px' }, maxWidth: 150 } },
      legend: { show: false },
      tooltip: { theme: 'dark' }
    });
    _appMetricCharts[elId].render();
  } catch(err) {}
}

async function renderAppLine(elId, appId, field, unit, agg, hours) {
  if (!field) return;
  try {
    var url = '/api/app-metrics/field-series?device_id=' + deviceId + '&app_id=' + appId + '&field=' + field + '&hours=' + (hours || 24);
    if (agg) url += '&agg=' + agg;
    var data = await apiGet(url);
    var items = data.items || [];
    if (items.length === 0) return;
    var series = [{
      name: unit || field,
      data: items.map(function(r) { return { x: new Date(r.ts).getTime(), y: r.value }; })
    }];
    _appMetricCharts[elId] = new ApexCharts(document.getElementById(elId), {
      ...ptChartTheme,
      chart: { type: 'area', toolbar: { show: false }, background: 'transparent',
               foreColor: '#7a8294', fontFamily: 'Roboto', height: 140, sparkline: { enabled: true } },
      series: series,
      colors: ['#00d4ff'],
      stroke: { curve: 'smooth', width: 1.5 },
      fill: { type: 'gradient', gradient: { shadeIntensity: 0.3, opacityFrom: 0.3, opacityTo: 0 } },
      dataLabels: { enabled: false },
      xaxis: { type: 'datetime', labels: { show: false }, axisBorder: { show: false }, axisTicks: { show: false } },
      yaxis: { labels: { show: false } },
      grid: { show: false },
      tooltip: { theme: 'dark', x: { format: 'dd MMM HH:mm' } }
    });
    _appMetricCharts[elId].render();
  } catch(err) {}
}

async function renderAppList(elId, appId, dim, limit, hours) {
  try {
    var data = await apiGet('/api/app-metrics/stats?device_id=' + deviceId + '&app_id=' + appId + '&dim=' + dim + '&hours=' + (hours || 24) + '&limit=' + (limit || 20));
    var items = data.items || [];
    var el = document.getElementById(elId);
    if (!el || items.length === 0) return;
    var maxS = Math.max.apply(null, items.map(function(r) { return r.sessions; }));
    el.innerHTML = items.map(function(r) {
      var pct = maxS > 0 ? Math.round(r.sessions / maxS * 100) : 0;
      return '<div style="display:flex;align-items:center;gap:4px;padding:3px 0">'
        + '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (r.label||'—') + '</span>'
        + '<span style="font-size:.68rem;color:var(--pt-muted);min-width:40px;text-align:right">' + r.sessions + '</span>'
        + '<div style="width:50px;height:5px;background:rgba(255,255,255,.06);border-radius:2px"><div style="width:' + pct + '%;height:100%;background:var(--pt-accent);border-radius:2px"></div></div>'
        + '</div>';
    }).join('');
  } catch(err) {}
}

function escJs(s) {
  if (!s) return '';
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'').replace(/"/g,'&quot;');
}

function openRec(id, title, deviceId) {
  var overlay = document.getElementById('recModal');
  var body = document.getElementById('recModalBody');
  var titleEl = document.getElementById('recModalTitle');
  titleEl.textContent = 'Рекомендация: ' + title;
  body.innerHTML = '<div class="modal-loading"><div class="spinner"></div><span style="color:var(--pt-muted);font-size:.8rem">Загрузка...</span></div>';
  overlay.style.display = 'flex';
  overlay.dataset.id = id;
  overlay.dataset.deviceId = deviceId;
  loadRec(id);
}

function closeRecModal() {
  document.getElementById('recModal').style.display = 'none';
}

function loadRec(id, refresh) {
  var body = document.getElementById('recModalBody');
  var params = refresh ? '?refresh=true' : '';
  body.innerHTML = '<div class="modal-loading"><div class="spinner"></div><span style="color:var(--pt-muted);font-size:.8rem">' + (refresh ? 'Запрос к AI...' : 'Загрузка...') + '</span></div>';
  apiPost('/api/anomalies/' + id + '/recommend' + params).then(function(r) {
    if (r.error) {
      body.innerHTML = '<span style="color:#ff5252">Ошибка: ' + r.error + '</span>';
    } else {
      var overlay = document.getElementById('recModal');
      var did = overlay ? parseInt(overlay.dataset.deviceId) : null;
      body.innerHTML = convertLogIds(mdToHtml(r.recommendation || '*Нет ответа*'), did)
        + '<div style="margin-top:16px;display:flex;gap:8px;align-items:center;border-top:1px solid rgba(255,255,255,.06);padding-top:12px">'
        + '<button class="btn btn-sm btn-outline" onclick="loadRec(' + id + ',true)"><i class="bi bi-arrow-clockwise"></i> Обновить</button>'
        + (r.cached ? '<span style="font-size:.72rem;color:var(--pt-muted)"><i class="bi bi-check-circle" style="color:var(--pt-success)"></i> из кэша</span>' : '')
        + '</div>';
    }
  }).catch(function(err) {
    body.innerHTML = '<span style="color:#ff5252">Ошибка: ' + err + '</span>';
  });
}

function toggleSummaryExpand(btn, fullId) {
  var div = document.getElementById(fullId);
  if (div.style.maxHeight === 'none') {
    div.style.maxHeight = '18em';
    div.style.overflow = 'hidden';
    btn.textContent = '... Читать дальше';
  } else {
    div.style.maxHeight = 'none';
    div.style.overflow = 'visible';
    btn.textContent = '... Свернуть';
  }
}

window.pageLoaded = loadDevice;
loadDevice();
</script>
