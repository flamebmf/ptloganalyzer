<div class="container" id="mainContent">

<div class="header-block">
  <h1>ДашБорд</h1>
  <div class="header-stats" id="headerStats">
    <div class="stat-badge"><span data-i18n="total_devices">Устройств</span> <span class="stat-val" id="statDevices">0</span></div>
    <div class="stat-badge"><span data-i18n="active_devices">Активны</span> <span class="stat-val" id="statActive">0</span></div>
    <div class="stat-badge"><span data-i18n="total_logs">Всего логов</span> <span class="stat-val" id="statLogs">0</span></div>
    <div class="stat-badge"><span data-i18n="anomalies_24h">Аномалии</span> <span class="stat-val" id="statAnomalies">0</span></div>
  </div>
</div>

<div class="chart-row">
  <div class="chart-card full" style="height:280px;padding:14px">
    <div class="card-title" style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
      <span><i class="bi bi-graph-up"></i> <span>Log volume</span></span>
      <div class="chart-tabs" style="display:flex;gap:4px">
        <button class="chart-tab active" data-voltab="d2d" onclick="switchVolTab('d2d')">D2D</button>
        <button class="chart-tab" data-voltab="week" onclick="switchVolTab('week')">Week</button>
        <button class="chart-tab" data-voltab="month" onclick="switchVolTab('month')">Month</button>
      </div>
    </div>
    <div id="dashVolumeChart" style="height:225px"></div>
  </div>
</div>
<div class="chart-row">
  <div class="chart-card half" style="height:220px;padding:14px">
    <div class="card-title" style="margin-bottom:6px"><i class="bi bi-exclamation-triangle"></i> <span>Anomaly trend</span></div>
    <div id="dashAnomalyTrend" style="height:180px"></div>
  </div>
  <div class="chart-card half" id="dashOnlineGrid" style="height:220px;padding:14px;overflow-y:auto">
    <div class="card-title" style="margin-bottom:10px"><i class="bi bi-hdd-stack"></i> <span>Devices</span></div>
    <div id="dashDeviceGrid" style="display:flex;flex-wrap:wrap;gap:8px"></div>
  </div>
</div>
<div class="chart-row">
  <div class="chart-card flex" id="dashStoragePanel" style="height:195px;overflow-y:auto">
    <div class="card-title" style="margin-bottom:6px"><i class="bi bi-database"></i> <span>Storage</span></div>
    <div id="dashStorageContent" style="font-size:.82rem"></div>
  </div>
  <div class="chart-card flex" id="dashSeverityPanel" style="height:195px;overflow-y:auto">
    <div class="card-title" style="margin-bottom:6px"><i class="bi bi-bar-chart"></i> <span>Severity</span></div>
    <div id="dashSeverityList" style="font-size:.82rem"></div>
  </div>
  <div class="chart-card flex" id="dashErrorPanel" style="height:195px;overflow-y:auto">
    <div class="card-title" style="margin-bottom:6px"><i class="bi bi-exclamation-triangle"></i> <span>Top 5 Errors</span></div>
    <div id="dashTopErrors" style="font-size:.82rem"></div>
  </div>
  <div class="chart-card flex" id="dashAppsPanel" style="height:195px;overflow-y:auto">
    <div class="card-title" style="margin-bottom:6px"><i class="bi bi-app"></i> <span>Top applications</span></div>
    <div id="dashTopApps" style="font-size:.82rem"></div>
  </div>
</div>
<div class="chart-row">
  <div class="chart-card half" id="dashSeverityChart" style="height:300px;padding:14px">
    <div class="card-title" style="margin-bottom:6px"><i class="bi bi-pie-chart"></i> <span>Severity distribution</span></div>
    <div id="dashSeverityChartInner" style="height:260px"></div>
  </div>
  <div class="chart-card half" id="dashDeviceStats" style="height:300px;overflow-y:auto">
    <div class="card-title" style="margin-bottom:6px"><i class="bi bi-hdd-stack"></i> <span>Logs per device</span></div>
    <div id="dashPerDevice" style="font-size:.85rem"></div>
  </div>
</div>
<div class="chart-row">
  <div class="chart-card half" id="dashLogTail" style="height:300px;overflow-y:auto;padding:14px">
    <div class="card-title" style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <span><i class="bi bi-list-ul"></i> <span>Live log</span></span>
      <span id="dashLogTailCount" style="font-size:.72rem;color:var(--pt-muted)"></span>
    </div>
    <div id="dashLogTailContent" style="font-size:.8rem;line-height:1.4"></div>
  </div>
</div>


</div>

<div class="modal-overlay" id="logModal" style="display:none" onclick="if(event.target===this)closeLogModal()">
  <div class="modal-content">
    <div class="modal-header">
      <span>Log #<span id="modalLogId"></span></span>
      <button class="modal-close" onclick="closeLogModal()">&times;</button>
    </div>
    <div id="modalBody" style="padding:16px;font-size:.85rem;line-height:1.6"></div>
  </div>
</div>

<footer>ptloganalyzer &copy; <span id="footerYear"></span></footer>
<script>document.getElementById('footerYear').textContent = new Date().getFullYear()</script>

<script src="vendor/apexcharts/apexcharts.min.js?v=__APP_VERSION__"></script>
<script src="js/app.js?v=__APP_VERSION__"></script>
<script src="js/bg-bars.js?v=__APP_VERSION__"></script>
<script src="js/charts.js?v=__APP_VERSION__"></script>
<script src="js/sse-client.js?v=__APP_VERSION__"></script>
<div id="sseEnabled" style="display:none"></div>

<script>
var _bulkPromise = null;
function getBulkData() {
  if (!_bulkPromise) _bulkPromise = apiGet('/api/devices/bulk-data');
  return _bulkPromise;
}

async function loadStats() {
  try {
    var devices = await apiGet('/api/devices');
    var bulk = await getBulkData();
    var elDev = document.getElementById('statDevices');
    if (elDev) elDev.textContent = devices.length;
    var active = 0, total = 0;
    for (var d of devices) {
      var s = (bulk.stats || {})[String(d.id)] || {};
      total += s.total || 0;
      if (s.online) active++;
    }
    var elActive = document.getElementById('statActive');
    if (elActive) elActive.textContent = active;
    var elLogs = document.getElementById('statLogs');
    if (elLogs) elLogs.textContent = total;
    var anomalies = await apiGet('/api/anomalies?limit=1&resolved=false');
    var elAnom = document.getElementById('statAnomalies');
    if (elAnom) elAnom.textContent = anomalies.total || 0;
  } catch(err) {}
}

async function loadStorage() {
  try {
    var st = await apiGet('/api/dashboard/storage');
    var el = document.getElementById('dashStorageContent');
    if (!el) return;
    function fmtSize(bytes) {
      if (!bytes) return '0 B';
      var u = ['B','KB','MB','GB','TB'], i = 0;
      while (bytes >= 1024 && i < u.length-1) { bytes /= 1024; i++; }
      return bytes.toFixed(i>0?1:0) + ' ' + u[i];
    }
    el.innerHTML =
      '<div class="card-stat"><span>DB size</span><span class="stat-val">' + fmtSize(st.db_size) + '</span></div>' +
      '<div class="card-stat"><span>Total logs</span><span class="stat-val">' + (st.total_logs||0).toLocaleString() + '</span></div>' +
      '<div class="card-stat"><span>Avg / day</span><span class="stat-val">' + (st.avg_per_day||0).toLocaleString() + '</span></div>' +
      '<div class="card-stat"><span>Oldest log</span><span class="stat-val" style="font-size:.75rem">' + (st.oldest_log ? new Date(st.oldest_log).toLocaleString() : '-') + '</span></div>';
  } catch(err) {}
}

async function loadDeviceGrid() {
  try {
    var devices = await apiGet('/api/devices');
    var bulk = await getBulkData();
    var el = document.getElementById('dashDeviceGrid');
    if (!el) return;
    var html = '';
    for (var d of devices) {
      var s = (bulk.stats || {})[String(d.id)] || {};
      var online = s.online;
      var lastTime = s.last_seen ? new Date(s.last_seen).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '-';
      html += '<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:6px 10px;font-size:.75rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap">' +
        '<span style="width:8px;height:8px;border-radius:50%;background:' + (online ? '#00e676' : '#ff5252') + ';flex-shrink:0"></span>' +
        '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (d.name || d.hostname) + '</span>' +
        '<span style="color:var(--pt-muted);flex-shrink:0">' + (s.total||0) + '</span>' +
        '<span style="color:var(--pt-muted);margin-left:auto;font-size:.68rem;flex-shrink:0">' + lastTime + '</span>' +
        '</div>';
    }
    el.innerHTML = html || '<span style="color:var(--pt-muted)">No devices</span>';
  } catch(err) {}
}

async function loadLogTail() {
  try {
    var data = await apiGet('/api/dashboard/logtail?limit=20');
    var el = document.getElementById('dashLogTailContent');
    var countEl = document.getElementById('dashLogTailCount');
    if (!el) return;
    var labels = ['Emerg','Alert','Crit','Err','Warning','Notice','Info','Debug'];
    var sevColors = ['#ff1744','#ff5252','#d50000','#ff9100','#ffd740','#00e676','#00d4ff','#7a8294'];
    if (countEl) countEl.textContent = data.items.length + ' messages';
    el.innerHTML = data.items.map(function(m) {
      var sev = m.severity !== null && m.severity !== undefined ? m.severity : 6;
      var label = labels[sev] || '?';
      var color = sevColors[sev] || '#7a8294';
      return '<div style="display:flex;gap:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)">' +
        '<span style="white-space:nowrap;color:var(--pt-muted);font-size:.72rem">' + new Date(m.ts).toLocaleTimeString() + '</span>' +
        '<span style="white-space:nowrap;color:' + color + ';font-weight:700;font-size:.72rem">' + label + '</span>' +
        '<span style="white-space:nowrap;color:var(--pt-muted);font-size:.72rem;min-width:60px">' + escHtml(m.device) + '</span>' +
        '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--pt-text)">' + escHtml(m.message || '') + '</span>' +
        '</div>';
    }).join('') || '<span style="color:var(--pt-muted)">No messages</span>';
  } catch(err) {}
}

async function loadDashboardCharts() {
  try {
    const data = await apiGet('/api/dashboard/history');
    window._volD2D = data.volume.map(d => ({ hour: d.hour, count: d.count }));
    window._volD2DPrev = data.volume_yesterday.map(d => ({ hour: d.hour, count: d.count }));
    window._volWeek = (data.volume_week || []).map(d => ({ day: d.day, count: d.count }));
    window._volWeekPrev = (data.volume_week_prev || []).map(d => ({ day: d.day, count: d.count }));
    window._volMonth = (data.volume_month || []).map(d => ({ day: d.day, count: d.count }));
    window._volMonthPrev = (data.volume_month_prev || []).map(d => ({ day: d.day, count: d.count }));
    var volChart = document.getElementById('dashVolumeChart');
    if (volChart && volChart.children.length < 2) {
      _volChart = createLogVolumeD2DChart('dashVolumeChart', window._volD2D, window._volD2DPrev);
    }
    const anomalyTrend = data.anomaly_trend.map(d => ({ hour: d.hour, count: d.count }));
    const anomalyForecast = (data.anomaly_forecast || []).map(d => ({ hour: d.hour, count: d.count }));
    var anomalyEl = document.getElementById('dashAnomalyTrend');
    if (anomalyEl && anomalyEl.children.length < 2) {
      createAnomalyTrendChart('dashAnomalyTrend', anomalyTrend, anomalyForecast);
    }
    const sevData = data.severity.map(d => ({ severity: d.severity, count: d.count }));
    const sevChart = document.getElementById('dashSeverityChartInner');
    if (sevChart && sevChart.children.length < 2) {
      createSeverityChart('dashSeverityChartInner', sevData);
    }
    const labels = ['Emerg','Alert','Crit','Err','Warning','Notice','Info','Debug'];
    const colors = ['#ff1744','#ff5252','#d50000','#ff9100','#ffd740','#00e676','#00d4ff','#7a8294'];
    const sevList = document.getElementById('dashSeverityList');
    if (sevList) sevList.innerHTML = data.severity.map(d => `
      <div style="display:flex;justify-content:space-between;padding:3px 0">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${colors[d.severity]||'#7a8294'};margin-right:8px"></span>${labels[d.severity]||d.severity}</span>
        <span class="stat-val">${d.count}</span>
      </div>
    `).join('');
    const topErrs = document.getElementById('dashTopErrors');
    if (topErrs) topErrs.innerHTML = data.top_errors.length
      ? data.top_errors.map(d => `
        <div style="display:flex;justify-content:space-between;padding:3px 0">
          <span><i class="bi bi-dot" style="color:#ff5252"></i>${d.hostname}</span>
          <span class="stat-val" style="color:#ff5252">${d.errors}</span>
        </div>
      `).join('')
      : '<span style="color:var(--pt-muted)">No errors in 24h</span>';
    const perDev = document.getElementById('dashPerDevice');
    if (perDev) perDev.innerHTML = data.per_device.map(d => {
      const pct = data.total ? Math.round(d.count / data.total * 100) : 0;
      return `
        <div style="margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;font-size:.8rem">
            <span>${d.hostname}</span>
            <span class="stat-val">${d.count} <span style="color:var(--pt-muted);font-size:.75rem">${pct}%</span></span>
          </div>
          <div style="height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:var(--pt-accent);border-radius:2px"></div>
          </div>
        </div>
      `;
    }).join('');
    const topApps = document.getElementById('dashTopApps');
    if (topApps) topApps.innerHTML = data.top_apps.map(d => `
      <div style="display:flex;justify-content:space-between;padding:3px 0;font-size:.85rem">
        <span>${d.app_name}</span>
        <span class="stat-val">${d.count}</span>
      </div>
    `).join('') || '<span style="color:var(--pt-muted)">No application data</span>';
  } catch(err) {
    showToast('Dashboard charts: '+err, 'error');
  }
}

window.pageLoaded = function() {
  _bulkPromise = null;
  loadStats();
  loadStorage();
  loadDeviceGrid();
  loadLogTail();
};

loadStats();
loadStorage();
loadDeviceGrid();
loadLogTail();
if (!window.location.hash || window.location.hash === '#index.html') {
  loadDashboardCharts();
}
</script>
</body>
</html>
