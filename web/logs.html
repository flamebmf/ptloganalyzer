<div class="header-block">
  <h1><span data-i18n="logs">Логи</span></h1>
</div>

<div class="chart-card">
  <div class="search-bar">
    <input type="text" id="query" placeholder="Поиск по тексту..." onkeyup="if(event.key==='Enter')searchLogs()">
    <select id="deviceFilter"><option value="">All devices</option></select>
    <div id="sevFilter"></div>
    <button class="btn btn-outline btn-sm" id="semanticToggle" onclick="toggleSemantic()" title="Семантический поиск"><i class="bi bi-stars"></i></button>
    <button class="btn btn-primary btn-sm" onclick="searchLogs()"><i class="bi bi-search"></i> <span data-i18n="search">Поиск</span></button>
  </div>

  <div id="logResults" style="max-height:calc(100vh - 320px);overflow-y:auto"></div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
var _logCurrentPage = 0;
var _logPageSize = 25;
var _logTotal = 0;
var _deviceMap = {};
var _semanticMode = false;

function toggleSemantic() {
  _semanticMode = !_semanticMode;
  var btn = document.getElementById('semanticToggle');
  btn.classList.toggle('btn-outline');
  btn.classList.toggle('btn-primary');
  if (_semanticMode) {
    document.getElementById('sevFilter').disabled = true;
  } else {
    document.getElementById('sevFilter').disabled = false;
  }
  searchLogs();
}

async function initPage() {
  createSeverityDropdown(document.getElementById('sevFilter'));
  try {
    var devices = await apiGet('/api/devices');
    var sel = document.getElementById('deviceFilter');
    devices.forEach(function(d) {
      _deviceMap[d.id] = d.hostname;
      var opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.hostname;
      sel.appendChild(opt);
    });
  } catch(err) {}
  searchLogs();
}

async function searchLogs(page) {
  if (page !== undefined) _logCurrentPage = page;
  var query = document.getElementById('query').value;
  var deviceId = document.getElementById('deviceFilter').value;
  var sev = document.getElementById('sevFilter').value;

  var resultsEl = document.getElementById('logResults');

  if (_semanticMode) {
    if (!query) { resultsEl.innerHTML = '<div class="empty-state"><p>Введите текст для поиска</p></div>'; document.getElementById('pagination').innerHTML = ''; return; }
    showLoading(resultsEl);
    var url = '/api/logs/similar?q=' + encodeURIComponent(query) + '&limit=' + _logPageSize;
    if (deviceId) url += '&device_id=' + deviceId;
    try {
      var data = await apiGet(url);
      if (data.items.length === 0) {
        resultsEl.innerHTML = '<div class="empty-state"><div class="icon"><i class="bi bi-search"></i></div><p>Нет результатов</p></div>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      resultsEl.innerHTML = '<table style="table-layout:auto;width:100%"><thead><tr>'
        + '<th style="width:1%">Score</th><th style="white-space:nowrap;width:1%">Time</th><th data-i18n="message" style="width:100%">Сообщение</th>'
        + '</tr></thead><tbody>'
        + data.items.map(function(r) {
          var score = r.score ? (r.score*100).toFixed(0) + '%' : '-';
          return '<tr onclick="location.href=\'#device.html?id=' + r.device_id + '\'" style="cursor:pointer">'
            + '<td style="color:var(--pt-accent);white-space:nowrap">' + score + '</td>'
            + '<td style="white-space:nowrap">' + formatTime(r.ts) + '</td>'
            + '<td style="overflow:hidden;text-overflow:ellipsis">' + (r.snippet || r.message) + '</td>'
            + '</tr>';
        }).join('')
        + '</tbody></table>';
      document.getElementById('pagination').innerHTML = '';
    } catch(err) { showToast('Ошибка: '+err, 'error'); }
    return;
  }

  var url = '/api/logs?limit=' + _logPageSize + '&offset=' + (_logCurrentPage * _logPageSize);
  if (query) url += '&query=' + encodeURIComponent(query);
  if (deviceId) url += '&device_id=' + deviceId;
  if (sev) url += '&severity=' + sev;

  showLoading(resultsEl);

  try {
    var data = await apiGet(url);
    _logTotal = data.total || data.items.length;
    if (data.items.length === 0) {
      resultsEl.innerHTML = '<div class="empty-state"><div class="icon"><i class="bi bi-search"></i></div><p data-i18n="no_data">Нет результатов</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    resultsEl.innerHTML = '<table style="table-layout:auto;width:100%"><thead><tr>'
      + '<th style="white-space:nowrap;width:1%">Time</th><th style="white-space:nowrap;width:1%">Host</th><th style="width:1%">Sev</th><th style="white-space:nowrap;width:1%">App</th><th data-i18n="message" style="width:100%">Сообщение</th>'
      + '</tr></thead><tbody>'
      + data.items.map(function(l) {
        return '<tr onclick="location.href=\'#device.html?id=' + l.device_id + '\'" style="cursor:pointer">'
          + '<td style="white-space:nowrap">' + formatTime(l.ts) + '</td>'
          + '<td style="white-space:nowrap">' + (_deviceMap[l.device_id] || '#' + l.device_id) + '</td>'
          + '<td>' + severityBadge(l.severity) + '</td>'
          + '<td style="white-space:nowrap">' + (l.app_name || '-') + '</td>'
          + '<td style="overflow:hidden;text-overflow:ellipsis">' + l.message + '</td>'
          + '</tr>';
      }).join('')
      + '</tbody></table>';

    var pages = Math.ceil(_logTotal / _logPageSize);
    var pg = document.getElementById('pagination');
    var cur = _logCurrentPage;
    var html = '';
    if (cur > 0) html += '<button onclick="searchLogs(' + (cur-1) + ')"><i class="bi bi-chevron-left"></i></button>';
    for (var p = Math.max(0,cur-2); p < Math.min(pages,cur+3); p++) {
      html += '<button class="' + (p === cur ? 'active' : '') + '" onclick="searchLogs(' + p + ')">' + (p+1) + '</button>';
    }
    if (cur < pages-1) html += '<button onclick="searchLogs(' + (cur+1) + ')"><i class="bi bi-chevron-right"></i></button>';
    pg.innerHTML = html;
  } catch(err) { showToast('Error: '+err, 'error'); }
}

initPage();
</script>
