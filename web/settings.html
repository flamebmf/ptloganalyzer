<div class="header-block">
  <h1><span data-i18n="settings">Настройки</span></h1>
</div>

<div class="chart-row">
  <div class="chart-card half">
    <div class="card-title" style="margin-bottom:16px"><i class="bi bi-info-circle"></i> Система</div>
    <div class="settings-form" id="appInfo"></div>
    <div class="settings-form" style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)">
      <label><i class="bi bi-translate"></i> Язык интерфейса</label>
      <select id="langSelect" onchange="changeLang()">
        <option value="ru">Русский</option>
        <option value="en">English</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="saveLang()" style="margin-top:4px"><i class="bi bi-check-lg"></i> Сохранить</button>
    </div>
    <div class="settings-form" style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)">
      <label><i class="bi bi-chat-dots"></i> Язык AI анализа</label>
      <select id="aiLangSelect">
        <option value="ru">Русский</option>
        <option value="en">English</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="saveAiLang()" style="margin-top:4px"><i class="bi bi-check-lg"></i> Сохранить</button>
      <small style="display:block;color:var(--pt-muted);margin-top:4px">Язык ответов AI в почасовых и дневных суммари.</small>
    </div>
  </div>
  <div class="chart-card half">
    <div class="card-title" style="margin-bottom:12px"><i class="bi bi-stars"></i> AI провайдер</div>
    <div class="settings-form" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
      <select id="aiProvider" onchange="onProviderChange()" style="width:auto">
        <option value="ollama">Ollama</option>
        <option value="openai">OpenAI</option>
        <option value="routerai">RouterAI</option>
      </select>
      <span id="aiStatus" class="badge"></span>
    </div>
    <div class="settings-form" style="padding-top:10px;margin-top:10px;border-top:1px solid rgba(255,255,255,.06)">
      <label style="font-size:.72rem"><i class="bi bi-link-45deg"></i> <span id="providerUrlLabel">URL</span></label>
      <input id="providerUrl" type="text" style="width:100%;font-size:.78rem" placeholder="http://...">
    </div>
    <div class="settings-form" style="padding-top:10px;margin-top:10px;border-top:1px solid rgba(255,255,255,.06)">
      <label style="font-size:.72rem"><i class="bi bi-funnel"></i> Мин. уровень аномалий</label>
      <select id="anomalyMinSev" style="width:100%;font-size:.78rem">
        <option value="info">Info</option>
        <option value="warning">Warning</option>
        <option value="critical">Critical</option>
      </select>
    </div>
    <div class="settings-form" style="padding-top:10px;margin-top:10px;border-top:1px solid rgba(255,255,255,.06)">
      <div id="aiTaskConfig"></div>
    </div>
    <div class="settings-form" style="padding-top:10px;margin-top:10px;border-top:1px solid rgba(255,255,255,.06)">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
        <label style="font-size:.72rem;margin:0;flex:1"><i class="bi bi-clock"></i> Часовые отчёты</label>
        <select id="summaryEnabled" style="width:auto;font-size:.78rem;padding:3px 6px">
          <option value="true">Вкл</option>
          <option value="false">Выкл</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="font-size:.72rem;margin:0;flex:1"><i class="bi bi-calendar"></i> Суточные отчёты</label>
        <select id="dailySummaryEnabled" style="width:auto;font-size:.78rem;padding:3px 6px">
          <option value="true">Вкл</option>
          <option value="false">Выкл</option>
        </select>
      </div>
    </div>
    <div style="text-align:right;margin-top:12px"><button class="btn btn-primary btn-sm" onclick="saveAiCard()"><i class="bi bi-check-lg"></i> Сохранить</button></div>
  </div>
</div>

<div class="chart-card" style="margin-top:14px">
  <div class="card-title" style="margin-bottom:16px"><i class="bi bi-hdd-stack"></i> Устройства</div>
  <div class="device-grid" id="deviceList"></div>
</div>

<script>
var _currentProvider = '';

async function loadSettings() {
  try {
    var settings = await apiGet('/api/settings');
    _currentProvider = settings.ai.provider;

    document.getElementById('appInfo').innerHTML =
      '<label>Приложение</label>'
      + '<input type="text" value="' + settings.app.name + ' v' + settings.app.version + '" readonly style="width:100%;margin-bottom:16px">'
      + '<label>Коллектор</label>'
      + '<input type="text" value="Порт ' + settings.collector.port + ' | ' + (settings.collector.enabled ? 'Включён' : 'Выключен') + '" readonly style="width:100%;margin-bottom:16px">'
      + '<label>AI суммаризация</label>'
      + '<input type="text" value="Интервал: ' + settings.ai.summarization_interval + ' мин" readonly style="width:100%;margin-bottom:12px">'
      + '<label>Детекция аномалий</label>'
      + '<input type="text" value="Интервал: ' + settings.ai.anomaly_interval + ' мин | Мин. уровень: ' + (settings.ai.anomaly_min_severity || 'info') + '" readonly style="width:100%;margin-bottom:12px">';

    document.getElementById('langSelect').value = settings.web.language;
    document.getElementById('aiLangSelect').value = settings.ai.language;
    document.getElementById('aiProvider').value = settings.ai.provider;
    document.getElementById('anomalyMinSev').value = settings.ai.anomaly_min_severity || 'info';
    document.getElementById('summaryEnabled').value = settings.ai.summary_enabled !== false ? 'true' : 'false';
    document.getElementById('dailySummaryEnabled').value = settings.ai.daily_summary_enabled !== false ? 'true' : 'false';
    updateAiStatus(settings.ai);
    onProviderChange();
  } catch(err) { showToast('Ошибка: '+err, 'error'); }
}

function updateAiStatus(ai) {
  var st = document.getElementById('aiStatus');
  if (!ai.enabled) {
    st.className = 'badge badge-warn'; st.textContent = 'Выключен';
  } else {
    st.className = 'badge badge-ok'; st.textContent = ai.provider;
  }
}

function onProviderChange() {
  var p = document.getElementById('aiProvider').value;
  var label = {ollama: 'URL (Ollama)', openai: 'URL (OpenAI)', routerai: 'URL (RouterAI)'}[p] || 'URL';
  document.getElementById('providerUrlLabel').textContent = label;
  var urlMap = {ollama: 'ollama_url', openai: 'openai_url', routerai: 'routerai_url'};
  // Fetch current settings to fill URL
  apiGet('/api/settings').then(function(s) {
    var url = s.ai[p] && s.ai[p].url;
    if (url) document.getElementById('providerUrl').value = url;
  }).catch(function(){});
}

async function saveLang() {
  var lang = document.getElementById('langSelect').value;
  try {
    await apiPatch('/api/settings', {language: lang});
    showToast('Язык сохранён: ' + lang, 'success');
  } catch(err) { showToast('Ошибка: '+err, 'error'); }
}

async function saveAiLang() {
  var lang = document.getElementById('aiLangSelect').value;
  try {
    await apiPatch('/api/settings', {ai_language: lang});
    showToast('Язык AI анализа сохранён: ' + lang + '. Изменения применятся к следующим суммари.', 'success');
  } catch(err) { showToast('Ошибка: '+err, 'error'); }
}

function changeLang() {
  // Just preview, save on button click
}

async function loadDevices() {
  try {
    var [devices, templates] = await Promise.all([
      apiGet('/api/devices'),
      apiGet('/api/parse-templates'),
    ]);
    var el = document.getElementById('deviceList');
    var tplOpts = '<option value="">-- Без шаблона --</option>';
    for (var t of templates) {
      tplOpts += '<option value="' + t.id + '">' + t.name + '</option>';
    }
    var html = '';
    for (var d of devices) {
      var stats = await apiGet('/api/devices/' + d.id + '/stats');
      var safeName = (d.name || d.hostname).replace(/'/g,"\\'");
      var cardTitle = d.name || d.hostname;
      html += '<div class="card-dash">'
        + '<div class="card-header">'
        + '<div class="card-title">' + cardTitle + (d.ip ? ' <span style="color:var(--pt-muted);font-weight:400;font-size:.8rem">(' + d.ip + ')</span>' : '') + '</div>'
        + '<span class="' + (stats.online ? 'online' : 'offline') + '"><i class="bi bi-circle-fill" style="font-size:.6rem"></i> ' + (stats.online ? 'online' : 'offline') + '</span>'
        + '</div><div class="card-body">'
        + '<div style="display:flex;gap:4px;align-items:center;margin-bottom:4px">'
        + '<input id="devName_' + d.id + '" value="' + (d.name || '') + '" placeholder="' + (d.name && d.hostname ? d.hostname : cardTitle) + (d.ip && !d.name ? ' (' + d.ip + ')' : '') + '" style="flex:1;font-weight:700;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:4px 8px;color:var(--pt-text);font-size:.8rem;outline:none">'
        + '<button class="btn btn-sm btn-primary" onclick="saveDeviceName(' + d.id + ')" title="Сохранить имя" style="padding:2px 6px;font-size:.75rem"><i class="bi bi-check-lg"></i></button>'
        + '</div>'
        + '<div style="display:flex;gap:4px;align-items:center;margin-bottom:4px">'
        + '<select id="devTpl_' + d.id + '" style="flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:4px 8px;color:var(--pt-text);font-size:.75rem;outline:none">' + tplOpts + '</select>'
        + '<button class="btn btn-sm btn-primary" onclick="saveDeviceTemplate(' + d.id + ')" title="Сохранить шаблон" style="padding:2px 6px;font-size:.75rem"><i class="bi bi-check-lg"></i></button>'
        + '</div>'
        + '<div class="card-stat"><span>Logs / 24h</span> <span class="stat-val">' + (stats.total || 0) + '</span></div>'
        + '<div class="card-stat"><span>' + (d.ip || '') + ' &middot; ' + (d.device_type || 'other') + '</span></div>'
        + '</div>'
        + '<div style="display:flex;gap:4px;padding:4px 8px 6px;flex-wrap:wrap">'
        + '<button id="devAi_' + d.id + '" class="btn btn-sm ' + (d.ai_enabled !== false ? 'btn-primary' : 'btn-outline') + '" onclick="toggleDeviceAi(' + d.id + ',' + (d.ai_enabled !== false ? 'false' : 'true') + ')" title="AI анализ" style="padding:2px 6px;font-size:.75rem"><i class="bi bi-stars"></i></button>'
        + '<button id="devToggle_' + d.id + '" class="btn btn-sm ' + (d.enabled ? 'btn-primary' : 'btn-outline') + '" onclick="toggleDevice(' + d.id + ',' + (d.enabled ? 'false' : 'true') + ')" style="padding:2px 6px;font-size:.75rem">' + (d.enabled ? 'ON' : 'OFF') + '</button>'
        + '<button class="btn btn-sm btn-outline" onclick="clearDeviceLogs(' + d.id + ',\'' + safeName + '\')" title="Очистить логи" style="padding:2px 6px;font-size:.75rem"><i class="bi bi-eraser"></i></button>'
        + '<button class="btn btn-sm btn-danger" onclick="deleteDevice(' + d.id + ',\'' + safeName + '\')" title="Удалить устройство" style="padding:2px 6px;font-size:.75rem"><i class="bi bi-trash"></i></button>'
        + '</div>'
        + '</div>';
    }
    if (devices.length === 0) {
      html = '<div class="empty-state" style="grid-column:1/-1"><p>Нет устройств. Добавьте через config.yaml.</p></div>';
    }
    el.innerHTML = html;
    // Set selected template for each device
    for (var d of devices) {
      var sel = document.getElementById('devTpl_' + d.id);
      if (sel && d.template_id) {
        sel.value = '' + d.template_id;
      } else if (sel) {
        sel.value = '';
      }
    }
  } catch(err) {}
}

async function toggleDevice(id, enable) {
  try {
    await apiPatch('/api/devices/' + id, {enabled: enable});
    var btn = document.getElementById('devToggle_' + id);
    btn.textContent = enable ? 'ON' : 'OFF';
    btn.className = 'btn btn-sm ' + (enable ? 'btn-primary' : 'btn-outline');
    btn.setAttribute('onclick', 'toggleDevice(' + id + ',' + !enable + ')');
    showToast('Устройство ' + (enable ? 'включено' : 'выключено'), 'success');
  } catch(err) { showToast('Ошибка: '+err, 'error'); }
}

async function toggleDeviceAi(id, enable) {
  try {
    await apiPatch('/api/devices/' + id, {ai_enabled: enable});
    var btn = document.getElementById('devAi_' + id);
    btn.className = 'btn btn-sm ' + (enable ? 'btn-primary' : 'btn-outline');
    btn.setAttribute('onclick', 'toggleDeviceAi(' + id + ',' + !enable + ')');
    showToast('AI анализ ' + (enable ? 'включён' : 'выключен') + ' для устройства', 'success');
  } catch(err) { showToast('Ошибка: '+err, 'error'); }
}

async function saveDeviceName(id) {
  var el = document.getElementById('devName_' + id);
  try {
    await apiPatch('/api/devices/' + id, {name: el.value || null});
    showToast('Имя сохранено', 'success');
    loadDevices();
  } catch(err) { showToast('Ошибка: '+err, 'error'); }
}

async function saveDeviceTemplate(id) {
  var el = document.getElementById('devTpl_' + id);
  var val = el.value ? parseInt(el.value) : null;
  try {
    await apiPatch('/api/devices/' + id, {template_id: val});
    showToast('Шаблон сохранён', 'success');
  } catch(err) { showToast('Ошибка: '+err, 'error'); }
}

async function clearDeviceLogs(id, name) {
  if (!confirm('Очистить все логи устройства "' + name + '" (' + id + ')? Эмбеддинги и суммаризации тоже будут удалены. Устройство останется.')) return;
  try {
    var r = await apiPost('/api/devices/' + id + '/clear-logs');
    showToast('Логи "' + name + '" очищены: ' + (r.deleted || 0) + ' записей', 'success');
  } catch(err) { showToast('Ошибка: '+err, 'error'); }
}

async function deleteDevice(id, name) {
  if (!confirm('Удалить устройство "' + name + '" и все его логи (' + id + ')? Это действие необратимо.')) return;
  try {
    await apiDelete('/api/devices/' + id);
    showToast('Устройство "' + name + '" удалено', 'success');
    loadDevices();
  } catch(err) { showToast('Ошибка: '+err, 'error'); }
}

loadSettings();
loadDevices();
loadAiTaskConfig();

var _aiConfigData = null;

async function loadAiTaskConfig() {
  try {
    var resp = await apiGet('/api/ai-config');
    _aiConfigData = resp;
    var el = document.getElementById('aiTaskConfig');
    var tasks = [
      {id: 'summarization', label: 'Суммаризация'},
      {id: 'anomaly_detection', label: 'Аномалии'},
      {id: 'embeddings', label: 'Эмбеддинги'},
    ];
    var html = '';
    for (var t of tasks) {
      var cur = resp.current[t.id] || {};
      html += '<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">'
        + '<span style="font-size:.72rem;font-weight:600;min-width:65px;color:var(--pt-muted);text-transform:uppercase;letter-spacing:.5px">' + t.label + '</span>'
        + '<select id="task-prov-' + t.id + '" onchange="onTaskProviderChange(\'' + t.id + '\')" style="flex:1;min-width:70px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:3px 6px;color:var(--pt-text);font-size:.72rem;outline:none">'
        + '<option value="">——</option>'
        + Object.keys(resp.providers).map(function(p) {
            return '<option value="' + p + '"' + (p === cur.provider ? ' selected' : '') + '>' + resp.providers[p].name + '</option>';
          }).join('')
        + '</select>'
        + '<select id="task-model-' + t.id + '" style="flex:1;min-width:90px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:3px 6px;color:var(--pt-text);font-size:.72rem;outline:none">'
        + '<option value="">——</option>'
        + '</select>'
        + '</div>';
    }
    el.innerHTML = html;
    // Populate model dropdowns
    for (var t of tasks) {
      onTaskProviderChange(t.id);
    }
  } catch(err) { console.error('aiConfig load error', err); }
}

function onTaskProviderChange(taskId) {
  var provSel = document.getElementById('task-prov-' + taskId);
  var modelSel = document.getElementById('task-model-' + taskId);
  var provider = provSel.value;
  var cur = _aiConfigData.current[taskId] || {};
  modelSel.innerHTML = '<option value="">-- Модель --</option>';
  if (!provider || !_aiConfigData.providers[provider]) return;
  var models = _aiConfigData.providers[provider].models || {};
  var isEmbed = taskId === 'embeddings';
  for (var m in models) {
    var mEmbed = m.toLowerCase().indexOf('embed') >= 0;
    if (isEmbed !== mEmbed) continue;
    var opt = document.createElement('option');
    opt.value = m;
    opt.textContent = models[m];
    if (m === cur.model) opt.selected = true;
    modelSel.appendChild(opt);
  }
}

async function saveAiCard() {
  var results = [];
  var body = {};

  // Provider (+ URL)
  var p = document.getElementById('aiProvider').value;
  var providerChanged = p !== _currentProvider;
  if (providerChanged) {
    body.ai_provider = p;
    _currentProvider = p;
  }
  // Provider URL
  var urlKey = p + '_url';
  var urlVal = document.getElementById('providerUrl').value.trim();
  if (urlVal) body[urlKey] = urlVal;

  // Anomaly min severity
  body.anomaly_min_severity = document.getElementById('anomalyMinSev').value;

  // Summary toggles
  body.summary_enabled = document.getElementById('summaryEnabled').value === 'true';
  body.daily_summary_enabled = document.getElementById('dailySummaryEnabled').value === 'true';

  // Batch settings
  try {
    var r = await apiPatch('/api/settings', body);
    var parts = [];
    if (r.changed && r.changed.ai_provider) parts.push('провайдер: ' + r.changed.ai_provider + (r.ai_restart_required ? ' (нужен перезапуск воркера)' : ''));
    if (r.changed && r.changed.anomaly_min_severity) parts.push('аномалии: ' + r.changed.anomaly_min_severity);
    if (r.changed && r.changed.summary_enabled !== undefined) parts.push('часовые: ' + (body.summary_enabled ? 'вкл' : 'выкл'));
    if (r.changed && r.changed.daily_summary_enabled !== undefined) parts.push('суточные: ' + (body.daily_summary_enabled ? 'вкл' : 'выкл'));
    if (r.changed && (r.changed.ollama_url || r.changed.openai_url || r.changed.routerai_url)) parts.push('URL обновлён');
    if (parts.length) results.push(parts.join(', '));
  } catch(err) { results.push('настройки: ошибка'); }

  // Task configs
  var aibody = {};
  var errors = [];
  for (var t of ['summarization', 'anomaly_detection', 'embeddings']) {
    var prov = document.getElementById('task-prov-' + t).value;
    var model = document.getElementById('task-model-' + t).value;
    if (!prov || !model) { errors.push(t); continue; }
    aibody[t] = {provider: prov, model: model};
  }
  if (errors.length) {
    results.push('модели: не заполнены (' + errors.join(', ') + ')');
  } else if (Object.keys(aibody).length) {
    try {
      await apiPatch('/api/ai-config', aibody);
      results.push('модели: ok');
    } catch(err) { results.push('модели: ошибка'); }
  }

  updateAiStatus({provider: p, enabled: true});
  showToast(results.length ? results.join(' | ') : 'Нет изменений', 'success');
}
</script>
