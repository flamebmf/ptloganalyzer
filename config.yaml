app:
  name: ptloganalyzer
  version: 0.3.1
  data_dir: /srv/ptloganalyzer
  log_level: info

database:
  host: infra.ptlog
  port: 5432
  name: ptloganalyzer
  user: ptlog
  password: ${DB_PASSWORD}
  pool_min: 5
  pool_max: 20

collector:
  enabled: true
  udp: true
  tcp: true
  port: 514
  bind: 0.0.0.0
  recv_buffer: 65536
  batch_size: 500
  batch_interval: 1.0

ai:
  enabled: true
  provider: routerai
  openai:
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    chat_model: gpt-4o-mini
    embedding_model: text-embedding-3-small
    embedding_dims: 1536
  ollama:
    base_url: http://localhost:11434
    chat_model: llama3.2:1b
    embedding_model: nomic-embed-text
    embedding_dims: 768
  routerai:
    api_key: ${ROUTERAI_API_KEY}
    base_url: https://routerai.ru/api/v1
    chat_model: deepseek/deepseek-v4-pro
    embedding_model: openai/text-embedding-3-small
    embedding_dims: 1536
  summarization:
    interval_minutes: 60
    max_logs_per_batch: 1000
  anomaly_detection:
    interval_minutes: 15
    sensitivity: medium

web:
  enabled: true
  serve_static: false
  language: ru

devices:
  - hostname: router01
    name: Core Router
    ip: 10.0.0.1
    device_type: router
    enabled: true
